<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Marc Sapa</title>
    <!--
      GitHub Pages SPA fallback. Pages serves this file for any unknown path.
      Stash the requested URL and bounce to the app root so React Router can
      take over (paired with the restore script in index.html).
    -->
    <script>
      sessionStorage.redirect = location.href;
    </script>
    <meta http-equiv="refresh" content="0;URL='/'" />
  </head>
  <body></body>
</html>
